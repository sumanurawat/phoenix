<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Phoenix AI Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .chat-interface {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .message-bubble {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }
        .message-bubble.user {
            background-color: #0d6efd;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0.25rem;
        }
        .message-bubble.assistant {
            background-color: #e9ecef;
            color: #212529;
            margin-right: auto;
            border-bottom-left-radius: 0.25rem;
        }
        .message-input-form {
            padding: 1rem;
            border-top: 1px solid #e9ecef;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="chat-interface">
        <header class="chat-header">
            <div>
                <a href="{{ url_for('meal_planner.index') }}" class="btn btn-sm btn-outline-secondary me-3">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <h1 class="h5 mb-0 d-inline-block">{{ conversation.title or 'New Meal Plan' }}</h1>
            </div>
            <div>
                <button class="btn btn-sm btn-outline-secondary">Export Plan</button>
                <button class="btn btn-sm btn-outline-danger">Archive</button>
            </div>
        </header>

        <main class="messages-container" id="messages">
            <!-- Sample messages -->
            <div class="message-bubble assistant">
                Hello! I'm your personalized meal planning assistant. What are we planning for this week?
            </div>
            <div class="message-bubble user">
                Hi! I'd like to plan my dinners for next week. I'm looking for some quick and healthy options.
            </div>
            <div class="message-bubble assistant">
                <div class="spinner-border spinner-border-sm" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                Thinking...
            </div>
        </main>

        <footer class="message-input-form">
            <form id="message-form">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Tell me about your meal planning needs..." autofocus>
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
